name: "HA MCP Plus"
description: >
  Extended MCP server for AI assistants (Claude, etc.).
  Automatically detects installed addons (InfluxDB, Grafana, Node-RED,
  Frigate, ESPHome) and activates the corresponding tools.
  No URL configuration needed — everything is auto-discovered.
version: "0.5.29"
slug: "ha_mcp_plus"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

homeassistant_api: true
hassio_api: true
hassio_role: admin
auth_api: true

map:
  - config:rw

ports:
  9584/tcp: 9584

ports_description:
  9584/tcp: "MCP Server endpoint (connect from Claude.ai)"

# ─────────────────────────────────────────────────────────────
# Configuration — URLs are auto-discovered from the Supervisor.
# Only fill in tokens for addons that require authentication.
# Leave empty if the addon uses anonymous access.
# ─────────────────────────────────────────────────────────────
schema:
  # ── Security ──────────────────────────────────────────────────
  # Verplicht: stel een uniek geheim pad in voor de MCP endpoint.
  # Laat leeg om automatisch een uniek pad te laten genereren bij eerste start.
  # Voorbeeld: /mcp-mijngeheimpad123  (gebruik NOOIT '/mcp')
  mcp_secret_path: str?

  # Enable the Python sandbox tool (code execution). Disabled by default.
  # Only enable when actively using analysis features — disable when not needed.
  sandbox_enabled: bool?

  # Home Assistant — only needed when running outside HA (e.g. local dev / Claude Desktop)
  # Leave empty when running as a HA addon; the Supervisor token is used automatically.
  ha_token: password?

  # InfluxDB — only needed if InfluxDB auth is enabled
  influx_token: password?
  influx_org: str?
  influx_bucket: str?

  # Grafana — only needed if Grafana auth is enabled (not anonymous)
  grafana_token: password?

  # Node-RED — no auth needed when admin auth is disabled (front door open)
  # Set nodered_token only if you re-enable Node-RED admin auth
  nodered_token: password?

  # Zigbee2MQTT — only needed if Z2M auth is enabled (disabled by default)
  z2m_token: password?

  # Music Assistant — long-lived token from MA Settings → Authentication
  ma_token: password?

  log_level: list(trace|debug|info|notice|warning|error|fatal)?

options:
  mcp_secret_path: ""
  ha_token: ""
  influx_token: ""
  influx_org: "homeassistant"
  influx_bucket: "homeassistant"
  grafana_token: ""
  nodered_token: ""
  z2m_token: ""
  ma_token: ""
  sandbox_enabled: false
  log_level: "info"
